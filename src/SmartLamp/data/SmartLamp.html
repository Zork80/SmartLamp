<!DOCTYPE html><html>
    <head>

    <script language="JavaScript" type="text/javascript" src="/SmartLamp.js"></script>

    <script language="JavaScript" type="text/javascript" src="/jquery-3.5.1.min.js"></script>
    <script src="/bootstrap.bundle.min.js"></script> 
    <link rel="stylesheet" href="/bootstrap.min.css" media="screen">

    <!--
    <script language="JavaScript" type="text/javascript" src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.5/css/bootstrap.min.css">
    -->

    <meta charset="utf-8" name="viewport" content="width=device-width, initial-scale=1">    
    <!--link rel="icon" href="data:,"-->
      <style>
        h1 {text-align: center;}
        p {text-align: center;}
      </style>
    </head>

    <body onload="onload()">
     <h1>Intelligente Lampe</h1>
     <div class="container">
     <p>
      <label class=myLabel id="_ledTheme" style="margin-left:1px;width:70px;">LED Thema</label>   
     </p>
     <!-- id 7 and 8 are reserved for dawn and dusk -->
     <div class="row justify-content-center">  
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="NEXT" onclick="valueChanged(this.id)">Vor</button></div>
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="PREV" onclick="valueChanged(this.id)">Zurück</button></div>
     </div>
     <p></p>
     <div class="row">   
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="0" onclick="valueChanged(this.id)">Aus</button></div>
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="1" onclick="valueChanged(this.id)">Feuer</button></div>
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="2" onclick="valueChanged(this.id)">Gelb</button></div>
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="3" onclick="valueChanged(this.id)">Regenbogen</button></div>
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="4" onclick="valueChanged(this.id)">Hell</button></div>
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="5" onclick="valueChanged(this.id)">Dunkel</button></div>
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="9" onclick="valueChanged(this.id)">Welle</button></div>
       <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" id="10" onclick="valueChanged(this.id)">Alarm</button></div>
      </div>
     
      <div class="input-group mb-4">
        <input type="color" class="form-control" id="colorpicker" onchange="valueChanged(this.id)" value="#0000ff">
        <div class="input-group-append">
          <button class="btn btn-success btn-lg" type="button" id="6" onclick="valueChanged(this.id)">Wahl</button>
        </div>
      </div>
     <form>
      <div class="col-sm-5">
        <div class="form-group">
        <label class="col-sm-4"><input type="checkbox" id="dawnCheck" onchange="valueChanged(this.id)" value="">Morgengrauen</label>
        <div class="col-sm-1">
          <input type="time" id="DAWN_SET" onblur="valueChanged(this.id)" onclick="javascript:textSelector(this)"/>
        </div>
        </div>
      </div>
      <div class="col-sm-5">
      <div class="form-group">
        <label class="col-sm-4"><input type="checkbox" id="duskCheck" onchange="valueChanged(this.id)" value="">Dämmerung</label>
        <div class="col-sm-1">
          <input type="time" id="DUSK_SET" onblur="valueChanged(this.id)" onclick="javascript:textSelector(this)"/>
        </div>
      </div>
      </div>
     </form>
     <div class="row">
      <div class="col-sm-4"><button type="button" class="btn btn-success btn-lg btn-block" onclick="onClickOk()">Übernehmen</button></div>
    </div>
    </div>
    </body></html>
